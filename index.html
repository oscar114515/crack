<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原始碼抓取 · 我的網站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding-top: 80px;
        }

        .navbar-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            transform: translateY(-100%);
            animation: slideDown 0.5s ease-out forwards;
            z-index: 4000;
        }

        @keyframes slideDown {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(0); }
        }

        .navbar {
            background-color: #f8f9fa;
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            width: 100%;
        }

        .logo a {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 50px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #007bff;
            font-size: 1rem;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #0056b3;
            text-decoration: underline;
        }

        .content-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: pointer;
        }

        .modal-box {
            background-color: white;
            padding: 30px 35px;
            border-radius: 16px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            cursor: default;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .qq-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        .qq-number {
            font-size: 1.6rem;
            font-weight: bold;
            color: #333;
            letter-spacing: 2px;
        }

        .qq-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 4px;
        }

        .platform-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 6px;
        }

        .platform-btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            border: 1px solid #dce3ed;
            border-radius: 40px;
            background: #ffffff;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1a1a1a;
            cursor: pointer;
            text-align: center;
            transition: 0.15s;
            font-family: sans-serif;
        }

        .platform-btn:active {
            background: #f0f0f0;
            transform: scale(0.97);
        }

        .platform-btn.bili {
            color: #00a1d6;
        }
        .platform-btn.xhs {
            color: #ff2442;
        }
        .platform-btn.douyin {
            color: #000000;
        }
        .platform-btn.yt {
            color: #ff0000;
        }

        .crack-tool h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .proxy-selector {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .proxy-selector label {
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .proxy-selector select {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background-color: white;
            cursor: pointer;
            max-width: 500px;
            min-width: 200px;
        }

        .proxy-selector select:focus {
            border-color: #0066cc;
            outline: none;
        }

        .proxy-selector select:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .proxy-status-badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 5px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .status-online {
            background-color: #00a86b;
            box-shadow: 0 0 8px rgba(0, 168, 107, 0.6);
        }

        .status-offline {
            background-color: #c62828;
            box-shadow: 0 0 8px rgba(198, 40, 40, 0.4);
        }

        .status-unknown {
            background-color: #ff9800;
            box-shadow: 0 0 8px rgba(255, 152, 0, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .proxy-note {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            padding: 6px 12px;
            background: #f8f9fa;
            border-radius: 4px;
            border-left: 3px solid #ccc;
            transition: border-color 0.3s ease;
        }

        .proxy-note.online {
            border-left-color: #00a86b;
        }

        .proxy-note.offline {
            border-left-color: #c62828;
        }

        .proxy-note.checking {
            border-left-color: #ff9800;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .input-group button {
            padding: 12px 25px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .input-group button:hover {
            background: #0052a3;
        }

        .input-group button:active {
            transform: scale(0.97);
        }

        .input-group button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .mode-group {
            display: flex;
            gap: 15px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .mode-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .mode-item input[type="radio"] {
            cursor: pointer;
        }

        .info-box {
            background: #e3f2fd;
            padding: 10px 15px;
            border-radius: 6px;
            margin: 10px 0;
            border-left: 4px solid #0066cc;
            font-size: 13px;
            transition: opacity 0.5s ease;
        }

        .info-box.hidden {
            display: none;
        }

        .info-box a {
            color: #0066cc;
            font-weight: 500;
            text-decoration: none;
        }

        .info-box a:hover {
            text-decoration: underline;
        }

        .result-area {
            margin-top: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .result-area:hover {
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .result-header {
            background: #f0f0f0;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            flex-wrap: wrap;
            gap: 8px;
        }

        .result-header .left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stats {
            background: #e0e0e0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        pre {
            margin: 0;
            padding: 15px;
            background: white;
            max-height: 400px;
            overflow: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .empty-state {
            color: #999;
            text-align: center;
            padding: 40px;
            font-style: italic;
            background: #fafafa;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px 15px;
            border-radius: 6px;
            margin: 15px 0;
            border-left: 4px solid #c62828;
            font-size: 14px;
        }

        .copy-btn {
            background: #e0e0e0;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s ease;
        }

        .copy-btn:hover:not(:disabled) {
            background: #d0d0d0;
        }

        .copy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .signature {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            text-align: center;
            color: #666;
            font-size: 13px;
        }
        .signature .name {
            font-weight: 600;
            color: #0066cc;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #e0e0e0;
            border-top: 2px solid #0066cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .captcha-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2500;
        }

        .captcha-modal-box {
            background-color: transparent;
            padding: 0;
            text-align: center;
            max-width: 400px;
            width: auto;
            box-shadow: none;
            animation: fadeIn 0.3s ease;
        }

        .captcha-modal-box .h-captcha {
            display: flex;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .modal-box {
                padding: 24px 20px;
                max-width: 300px;
            }
            .platform-grid {
                gap: 8px;
            }
            .platform-btn {
                padding: 10px 0;
                font-size: 0.85rem;
            }
            .qq-number {
                font-size: 1.3rem;
            }
            .qq-icon {
                width: 50px;
                height: 50px;
            }
            .card {
                padding: 20px;
            }
            .proxy-selector select {
                max-width: 100%;
                min-width: 120px;
            }
            .input-group {
                flex-wrap: wrap;
            }
            .input-group input {
                flex: 1 1 100%;
            }
            .input-group button {
                flex: 1 1 100%;
            }
            .result-header {
                flex-direction: column;
                align-items: stretch;
                gap: 5px;
            }
            .result-header .left {
                justify-content: center;
            }
            .mode-group {
                gap: 8px;
            }
        }
    </style>

    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body>
    <div class="navbar-wrapper">
        <nav class="navbar">
            <div class="logo">
                <a href="/">
                    <img src="https://i.postimg.cc/HxVC7TcN/IMG-8863.png" alt="Logo">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="#" id="contactBtn">聯繫我們</a></li>
            </ul>
        </nav>
    </div>

    <div class="content-wrapper">
        <div class="card crack-tool">
            <h2>🔍 網頁原始碼抓取工具</h2>

            <div class="info-box" id="corsInfo">
                <strong>📌 第一個代理需要授權：</strong>
                <a href="https://cors-anywhere.herokuapp.com" target="_blank" id="corsLink">點此開啟 CORS Anywhere</a>，點擊「Request temporary access」
                <span style="display:block;font-size:12px;color:#666;margin-top:4px;">✓ 授權後本提示會自動消失</span>
            </div>

            <div class="proxy-selector">
                <label for="proxySelect">🔄 代理：</label>
                <select id="proxySelect">
                    <option value="-1">⏳ 檢測中...</option>
                </select>
                <span id="proxyStatus" class="proxy-status-badge status-unknown"></span>
            </div>
            <div class="proxy-note checking" id="proxyNote">⏳ 正在檢測代理狀態...</div>

            <div class="input-group">
                <input type="text" id="urlInput" placeholder="請輸入網址 (例如：https://example.com)" value="https://example.com">
                <button id="fetchBtn">抓取</button>
            </div>

            <div class="mode-group">
                <label class="mode-item"><input type="radio" name="mode" value="baidu" checked> 🕷️ 百度</label>
                <label class="mode-item"><input type="radio" name="mode" value="google"> 🕷️ Google</label>
                <label class="mode-item"><input type="radio" name="mode" value="normal"> 🌐 電腦</label>
                <label class="mode-item"><input type="radio" name="mode" value="mobile"> 📱 手機</label>
            </div>

            <div id="error" class="error" style="display: none;"></div>

            <div id="loading" style="display: none; text-align: center; padding: 15px; background: #f8f9fa; border-radius: 6px;">
                <span class="loading-spinner"></span> ⏳ 抓取中...
            </div>

            <div class="result-area">
                <div class="result-header">
                    <div class="left">
                        <span>📄 原始碼</span>
                        <span id="urlDisplay" style="font-size:12px;color:#666;"></span>
                    </div>
                    <div>
                        <span id="stats" class="stats">等待抓取</span>
                        <button id="copyBtn" class="copy-btn" disabled>複製</button>
                    </div>
                </div>
                <pre id="codeDisplay" class="empty-state">👆 輸入網址，點擊「抓取」進行人機驗證</pre>
            </div>

            <div class="signature">
                <div class="name">by 梁喆同學</div>
                <div>小紅書 · bilibili · YouTube · 抖音</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="contact-info">
                <img src="https://i.postimg.cc/Z520m4jx/e1fb8ec8ae1db1ac50505adac82398e4.jpg" class="qq-icon">
                <div class="qq-label">QQ</div>
                <span class="qq-number">1962487792</span>
            </div>
            <div class="divider"></div>
            <div class="title">📱 追蹤我</div>
            <div class="platform-grid">
                <button class="platform-btn bili" id="btn-bili">嗶哩嗶哩</button>
                <button class="platform-btn xhs" id="btn-xhs">小紅書</button>
                <button class="platform-btn douyin" id="btn-douyin">抖音</button>
                <button class="platform-btn yt" id="btn-yt">YouTube</button>
            </div>
        </div>
    </div>

    <div class="captcha-modal-overlay" id="captchaModal" onclick="closeCaptchaModal()">
        <div class="captcha-modal-box" onclick="event.stopPropagation()">
            <div class="h-captcha" data-sitekey="75682f5c-dac2-410e-a0c6-ceb4a0ba5e7e" data-callback="onCaptchaSuccess"></div>
        </div>
    </div>

    <script>
        const PROXY_LIST = [
            { name: 'CORS Anywhere (需授權)', url: 'https://cors-anywhere.herokuapp.com/' },
            { name: 'CORS Proxy', url: 'https://cors-proxy.htmldriven.com/?url=' },
            { name: 'All Origins', url: 'https://api.allorigins.win/raw?url=' },
            { name: 'ThingProxy', url: 'https://thingproxy.freeboard.io/fetch/' },
            { name: 'CORS Proxy 2', url: 'https://cors-proxy.learn.uno/?url=' },
            { name: 'CORS Anywhere Worker', url: 'https://cors-anywhere.azm.workers.dev/' },
            { name: 'CORS Proxy IO', url: 'https://corsproxy.io/?url=' }
        ];

        let proxyStatuses = [];
        let isChecking = false;

        const proxySelect = document.getElementById('proxySelect');
        const proxyStatus = document.getElementById('proxyStatus');
        const proxyNote = document.getElementById('proxyNote');
        const corsInfo = document.getElementById('corsInfo');
        const corsLink = document.getElementById('corsLink');
        const urlInput = document.getElementById('urlInput');
        const fetchBtn = document.getElementById('fetchBtn');
        const errorDiv = document.getElementById('error');
        const loadingDiv = document.getElementById('loading');
        const codeDisplay = document.getElementById('codeDisplay');
        const urlDisplay = document.getElementById('urlDisplay');
        const statsDisplay = document.getElementById('stats');
        const copyBtn = document.getElementById('copyBtn');

        function getStatusSymbol(status) {
            if (status === 'online') return '🟢';
            if (status === 'offline') return '🔴';
            return '🟠';
        }

        function updateProxyNote(status) {
            proxyNote.className = 'proxy-note';
            if (status === 'online') {
                proxyNote.className = 'proxy-note online';
                proxyNote.innerHTML = '✅ 當前代理在線，可以使用';
            } else if (status === 'offline') {
                proxyNote.className = 'proxy-note offline';
                proxyNote.innerHTML = '⚠️ 當前代理離線，請切換其他代理';
            } else {
                proxyNote.className = 'proxy-note checking';
                proxyNote.innerHTML = '⏳ 檢測代理狀態中...';
            }
        }

        function updateStatusDot(status) {
            proxyStatus.className = `proxy-status-badge status-${status}`;
        }

        function renderProxySelect() {
            proxySelect.innerHTML = '';

            const onlineProxies = proxyStatuses.filter(s => s.status === 'online');
            const hasOnline = onlineProxies.length > 0;

            if (!hasOnline) {
                const option = document.createElement('option');
                option.value = '-1';
                option.textContent = '⚠️ 無可用代理，請稍後再試';
                proxySelect.appendChild(option);
                proxySelect.disabled = true;
                updateStatusDot('offline');
                updateProxyNote('offline');
                return;
            }

            proxySelect.disabled = false;

            onlineProxies.forEach((proxy, idx) => {
                const option = document.createElement('option');
                option.value = idx;
                option.textContent = proxy.name + ' ' + getStatusSymbol(proxy.status);
                proxySelect.appendChild(option);
            });

            proxySelect.selectedIndex = 0;
            const firstOnline = onlineProxies[0];
            updateStatusDot(firstOnline.status);
            updateProxyNote(firstOnline.status);

            if (firstOnline.name.includes('CORS Anywhere')) {
                corsInfo.classList.remove('hidden');
            } else {
                corsInfo.classList.add('hidden');
            }
        }

        async function checkProxyStatus(proxy, index) {
            const testUrl = proxy.url + 'https://httpbin.org/get';

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);

                const response = await fetch(testUrl, {
                    method: 'HEAD',
                    mode: 'cors',
                    cache: 'no-cache',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                proxyStatuses[index].status = response.ok ? 'online' : 'offline';
            } catch (error) {
                proxyStatuses[index].status = 'offline';
            }
        }

        async function checkAllProxies() {
            if (isChecking) return;
            isChecking = true;

            proxyStatuses = PROXY_LIST.map(p => ({
                name: p.name,
                url: p.url,
                status: 'unknown'
            }));

            const promises = PROXY_LIST.map((proxy, idx) => checkProxyStatus(proxy, idx));
            await Promise.allSettled(promises);

            renderProxySelect();
            isChecking = false;
        }

        function getCurrentProxyUrl() {
            const onlineProxies = proxyStatuses.filter(s => s.status === 'online');
            if (onlineProxies.length === 0) return null;
            const idx = proxySelect.selectedIndex;
            if (idx < 0 || idx >= onlineProxies.length) return null;
            return onlineProxies[idx].url;
        }

        let pendingUrl = '';
        let pendingMode = '';

        function openCaptchaModal() {
            document.getElementById('captchaModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeCaptchaModal() {
            document.getElementById('captchaModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            if (typeof hcaptcha !== 'undefined') {
                hcaptcha.reset();
            }
        }

        window.onCaptchaSuccess = function(token) {
            closeCaptchaModal();
            executeFetch();
        };

        function executeFetch() {
            const url = pendingUrl;
            const mode = pendingMode;
            const proxyUrl = getCurrentProxyUrl();

            if (!url || !proxyUrl) {
                showError('沒有可用的代理，請稍後再試');
                return;
            }

            showLoading();

            const fullUrl = proxyUrl + url;

            const xhr = new XMLHttpRequest();
            xhr.open('GET', fullUrl);
            xhr.timeout = 30000;
            xhr.setRequestHeader('User-Agent', USER_AGENTS[mode]);
            xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');

            xhr.onload = function() {
                hideLoading();
                if (xhr.status >= 200 && xhr.status < 300) {
                    const text = xhr.responseText;
                    codeDisplay.textContent = text;
                    codeDisplay.className = '';
                    urlDisplay.textContent = `(${url})`;
                    statsDisplay.textContent = `${xhr.status} | ${(text.length / 1024).toFixed(2)}KB | ${mode}`;
                    copyBtn.disabled = false;
                } else {
                    showError(`錯誤 ${xhr.status} - ${xhr.statusText || '代理可能失效'}`);
                }
            };
            xhr.onerror = () => showError('網路錯誤，請檢查連線');
            xhr.ontimeout = () => showError('連線超時，請稍後再試');
            xhr.send();
        }

        const USER_AGENTS = {
            baidu: 'Mozilla/5.0 (compatible; Baiduspider/2.0; +http://www.baidu.com/search/spider.html)',
            google: 'Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)',
            normal: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
            mobile: 'Mozilla/5.0 (iPhone; CPU iPhone OS 14_0 like Mac OS X) AppleWebKit/605.1.15'
        };

        function resetDisplay() {
            codeDisplay.textContent = '👆 輸入網址，點擊「抓取」進行人機驗證';
            codeDisplay.className = 'empty-state';
            urlDisplay.textContent = '';
            statsDisplay.textContent = '等待抓取';
            copyBtn.disabled = true;
        }

        function showError(msg) {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = msg;
            loadingDiv.style.display = 'none';
            fetchBtn.disabled = false;
            resetDisplay();
        }

        function hideError() { errorDiv.style.display = 'none'; }

        function showLoading() {
            fetchBtn.disabled = true;
            loadingDiv.style.display = 'block';
            hideError();
            codeDisplay.textContent = '⏳ 抓取中...';
            codeDisplay.className = 'empty-state';
            statsDisplay.textContent = '抓取中';
        }

        function hideLoading() {
            fetchBtn.disabled = false;
            loadingDiv.style.display = 'none';
        }

        function handleFetchClick() {
            const url = urlInput.value.trim();
            const mode = document.querySelector('input[name="mode"]:checked').value;

            if (!url) {
                showError('請輸入網址');
                return;
            }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                showError('網址須以 http:// 或 https:// 開頭');
                return;
            }

            pendingUrl = url;
            pendingMode = mode;

            openCaptchaModal();
        }

        proxySelect.addEventListener('change', function() {
            const onlineProxies = proxyStatuses.filter(s => s.status === 'online');
            if (onlineProxies.length === 0) return;

            const idx = this.selectedIndex;
            if (idx < 0 || idx >= onlineProxies.length) return;

            const selected = onlineProxies[idx];
            updateStatusDot(selected.status);
            updateProxyNote(selected.status);

            if (selected.name.includes('CORS Anywhere')) {
                corsInfo.classList.remove('hidden');
            } else {
                corsInfo.classList.add('hidden');
            }
        });

        corsLink.addEventListener('click', function() {
            setTimeout(checkAllProxies, 3000);
        });

        copyBtn.addEventListener('click', () => {
            const text = codeDisplay.textContent;
            if (text.includes('輸入網址') || text.includes('抓取中')) return;

            navigator.clipboard?.writeText(text).then(() => {
                copyBtn.textContent = '✓ 已複製';
                setTimeout(() => copyBtn.textContent = '複製', 1500);
            }).catch(() => {
                const range = document.createRange();
                range.selectNode(codeDisplay);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                copyBtn.textContent = '✓ 已複製';
                setTimeout(() => copyBtn.textContent = '複製', 1500);
            });
        });

        fetchBtn.addEventListener('click', handleFetchClick);
        urlInput.addEventListener('keypress', e => e.key === 'Enter' && handleFetchClick());

        const contactBtn = document.getElementById('contactBtn');
        const modalOverlay = document.getElementById('modalOverlay');

        contactBtn.addEventListener('click', function(e) {
            e.preventDefault();
            modalOverlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });

        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) {
                modalOverlay.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.style.display === 'flex') {
                modalOverlay.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });

        document.getElementById('btn-bili').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://space.bilibili.com/3632309945239723', '_blank');
        });

        document.getElementById('btn-xhs').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://xhslink.com/m/5aECPzZiqGQ', '_blank');
        });

        document.getElementById('btn-douyin').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://v.douyin.com/HDdZvMmGXwU/', '_blank');
        });

        document.getElementById('btn-yt').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://www.youtube.com/@%E6%A2%81%E5%96%86%E5%90%8C%E5%AD%B8', '_blank');
        });

        resetDisplay();
        checkAllProxies();
        setInterval(checkAllProxies, 60000);
    </script>
</body>
</html>
